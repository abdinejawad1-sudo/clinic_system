<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<title>حجز موعد أسنان</title>

<style>

*{
    box-sizing:border-box;
    font-family: "Segoe UI", Arial, sans-serif;
}


body{

    margin:0;
    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    background:
    linear-gradient(135deg,#e3f2fd,#ffffff);

}


/* بطاقة الحجز */

.booking-card{

    width:380px;

    background:white;

    padding:30px;

    border-radius:20px;

    box-shadow:
    0 15px 35px rgba(0,0,0,0.12);

    animation:showCard 0.8s ease;

}


/* ظهور البطاقة */

@keyframes showCard{

    from{

        opacity:0;
        transform:translateY(40px);

    }

    to{

        opacity:1;
        transform:translateY(0);

    }

}



h2{

    text-align:center;

    color:#1565c0;

    margin-bottom:25px;

}



/* الحقول */

input{

    width:100%;

    padding:13px;

    margin-bottom:15px;

    border:1px solid #ddd;

    border-radius:12px;

    font-size:15px;

    transition:0.3s;

}



input:focus{

    outline:none;

    border-color:#2196f3;

    box-shadow:
    0 0 8px rgba(33,150,243,0.3);

}



/* الزر */

button{

    width:100%;

    padding:14px;

    border:none;

    border-radius:12px;

    background:#1976d2;

    color:white;

    font-size:17px;

    cursor:pointer;

    transition:0.3s;

}



button:hover{

    background:#0d47a1;

    transform:translateY(-2px);

}



button:active{

    transform:scale(0.97);

}



/* الرسالة */

#msg{

    margin-top:20px;

    text-align:center;

    color:#2e7d32;

    font-weight:bold;

    animation:fade 0.5s;

}


@keyframes fade{

    from{
        opacity:0;
    }

    to{
        opacity:1;
    }

}



.logo{

    text-align:center;

    font-size:45px;

    margin-bottom:10px;

}



</style>

</head>


<body>


<div class="booking-card">


<div class="logo">
🦷
</div>


<h2>
حجز موعد أسنان
</h2>



<input 
id="name"
placeholder="👤 اسم المريض">



<input 
id="phone"
placeholder="📞 رقم الهاتف">



<input 
id="date"
type="date">



<input 
id="time"
placeholder="⏰ وقت الموعد">



<button onclick="book()">

🦷 تأكيد الحجز

</button>



<p id="msg"></p>



</div>





<script>

async function book(){

// إنشاء المريض

let patient = await fetch(
"/api/patients",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({

name:
document.getElementById("name").value,

phone:
document.getElementById("phone").value

})
});


let p = await patient.json();


// إنشاء الموعد

let appointment = await fetch(
"/api/appointments",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

patient_id:p.id,

date:
document.getElementById("date").value,

time:
document.getElementById("time").value

})

});


let result = await appointment.json();



document.getElementById("msg").innerHTML =
"✅ تم حجز الموعد بنجاح";

}

</script>


</body>

</html>
