<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة تحكم الطبيب | عيادة ابتسامة</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Markazi+Text:wght@500;600;700&family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/dashboard.css">
</head>
<body class="dashboard-body">

<!-- ============ شاشة تسجيل الدخول ============ -->
<div id="login-screen" class="login-screen">
  <form id="login-form" class="login-card">
    <div class="login-brand">
      <svg class="brand-mark" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M24 6C17 6 12 11 12 18c0 6 2 10 3 15 1 4 2 9 5 9s3-6 4-9c0.5-1.5 1.5-1.5 2 0 1 3 1 9 4 9s4-5 5-9c1-5 3-9 3-15 0-7-5-12-12-12" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <h1>لوحة تحكم الطبيب</h1>
    </div>
    <div class="form-row">
      <label for="username">اسم المستخدم</label>
      <input type="text" id="username" required autocomplete="username">
    </div>
    <div class="form-row">
      <label for="password">كلمة المرور</label>
      <input type="password" id="password" required autocomplete="current-password">
    </div>
    <button type="submit" class="btn btn-primary btn-block">تسجيل الدخول</button>
    <p id="login-message" class="form-message error"></p>
  </form>
</div>

<!-- ============ لوحة التحكم ============ -->
<div id="dashboard-screen" class="dashboard-screen hidden">
  <header class="dash-header">
    <div class="container dash-header-inner">
      <span class="brand">عيادة <strong>ابتسامة</strong> — لوحة الطبيب</span>
      <button id="logout-btn" class="btn btn-ghost btn-sm">تسجيل الخروج</button>
<button id="patients-btn">
    المرضى
</button>
    </div>
  </header>
<div id="notification-box" style="
    position:relative;
    display:inline-block;
    cursor:pointer;
    margin:20px;
">

<button id="notification-btn">
🔔 الإشعارات
</button>

<div id="notifications-list" style="
    display:none;
    position:absolute;
    background:white;
    border:1px solid #ccc;
    padding:15px;
    width:300px;
    right:0;
    z-index:1000;
    border-radius:10px;
">
</div>

</div>

  <main class="container dash-main">
    <div class="dash-toolbar">
      <div class="filter-group">
        <label for="filter-date">التاريخ</label>
        <input type="date" id="filter-date">
      </div>
      <div class="filter-group">
        <label for="filter-status">الحالة</label>
        <select id="filter-status">
          <option value="">الكل</option>
          <option value="confirmed">مؤكد</option>
          <option value="done">تم الكشف</option>
          <option value="cancelled">ملغى</option>
<div class="filter-group">
  <label for="filter-search">بحث</label>
  <input 
    type="text" 
    id="filter-search" 
    placeholder="اسم المريض أو الهاتف">
</div>
        </select>
      </div>
      <button id="refresh-btn" class="btn btn-ghost btn-sm">تحديث</button>
      <button id="clear-filters-btn" class="btn btn-ghost btn-sm">مسح الفلاتر</button>
    </div>

    <div class="dash-stats" id="dash-stats"></div>

    <div class="table-wrap">
      <table class="appt-table">
        <thead>
          <tr>
            <th>المريض</th>
            <th>الهاتف</th>
            <th>التاريخ</th>
            <th>الوقت</th>
            <th>الخدمة</th>
            <th>الحالة</th>
            <th>تذكير</th>
            <th>إجراءات</th>
          </tr>
        </thead>
        <tbody id="appt-tbody">
          <tr><td colspan="8" class="empty-row">جارِ التحميل...</td></tr>
        </tbody>
      </table>
    </div>
  </main>
</div>

<script src="js/dashboard.js"></script>
</body>
</html>
