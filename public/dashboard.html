<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة تحكم الطبيب | عيادة ابتسامة</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
<style>
/* نافذة الحجز */

.modal{

position:fixed;
top:0;
left:0;
width:100%;
height:100%;

background:rgba(0,0,0,.7);

display:flex;
align-items:center;
justify-content:center;

z-index:9999;

}


.modal-box{

background:#102542;

width:90%;
max-width:500px;

padding:30px;

border-radius:20px;

display:flex;
flex-direction:column;

gap:15px;

box-shadow:0 20px 50px #000;

}


.modal-box h2{

text-align:center;
color:#4da6ff;

}


.modal-box input{

padding:15px;

border-radius:10px;

border:1px solid #555;

background:#fff;

color:#000;

font-size:18px;

}


.modal-buttons{

display:flex;

gap:15px;

}


.modal-buttons button{

flex:1;

padding:15px;

border:none;

border-radius:12px;

cursor:pointer;

font-size:18px;

}


#save-appointment{

background:#25D366;

color:white;

}


#close-modal{

background:#ff6b6b;

color:white;

}



@media(max-width:600px){

.modal-box{

width:95%;

padding:20px;

}

}
/* ===== RESET & BASE ===== */
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Tajawal', sans-serif;
  background: #0a192f;
  color: #fff;
  min-height: 100vh;
}
.hidden { display: none !important; }

/* ===== شاشة تسجيل الدخول ===== */
.login-screen {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #0a192f;
  padding: 20px;
}
.login-card {
  background: rgba(255, 255, 255, 0.05);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.1);
  padding: 40px;
  border-radius: 20px;
  width: 100%;
  max-width: 400px;
  display: flex;
  flex-direction: column;
  gap: 20px;
  box-shadow: 0 20px 50px rgba(0,0,0,0.3);
}
.login-brand { text-align: center; margin-bottom: 10px; }
.login-brand h1 { font-size: 1.5rem; color: #4da6ff; }
.form-row { display: flex; flex-direction: column; gap: 8px; }
.form-row label { font-weight: 600; color: #ddd; }
.form-row input {
  padding: 12px 15px;
  border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.2);
  background: rgba(255,255,255,0.1);
  color: #fff;
  font-family: inherit;
  font-size: 1rem;
}
.form-row input:focus { outline: none; border-color: #4da6ff; }
.btn-block { width: 100%; padding: 14px; border: none; border-radius: 10px; background: #1e3c72; color: #fff; font-size: 1rem; font-weight: bold; cursor: pointer; transition: 0.3s; }
.btn-block:hover { background: #2a5298; }
.form-message { text-align: center; font-weight: bold; color: #ff6b6b; }

/* ===== لوحة التحكم ===== */
.dash-header {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid rgba(255,255,255,0.1);
  padding: 15px 0;
  position: sticky;
  top: 0;
  z-index: 100;
}
.dash-header-inner {
  max-width: 1200px; margin: 0 auto; padding: 0 20px;
  display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px;
}
.dash-header .brand { font-size: 1.2rem; font-weight: bold; color: #fff; }
.dash-header .brand strong { color: #4da6ff; }
.dash-header button {
  background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
  color: #fff; padding: 8px 18px; border-radius: 10px; cursor: pointer; transition: 0.3s;
}
.dash-header button:hover { background: rgba(255,255,255,0.2); }

/* ===== الإشعارات ===== */
#notification-box { position: relative; display: inline-block; }
#notification-btn { position: relative; }
#notification-count {
  position: absolute; top: -8px; right: -8px;
  background: #ff6b6b; color: white; border-radius: 50%;
  padding: 2px 8px; font-size: 12px; font-weight: bold;
}
#notifications-list {
  display: none; position: absolute; top: 100%; right: 0;
  background: #1a2a4a; border: 1px solid rgba(255,255,255,0.1);
  padding: 15px; width: 320px; border-radius: 15px;
  z-index: 1000; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}
#notifications-list div { border-bottom: 1px solid rgba(255,255,255,0.05); padding: 10px 0; }
#notifications-list div:last-child { border-bottom: none; }
#notifications-list button {
  background: #25D366; color: white; border: none; padding: 6px 12px; border-radius: 8px; cursor: pointer; margin-top: 5px; width: 100%;
}

/* ===== المحتوى الرئيسي ===== */
.dash-main { max-width: 1200px; margin: 0 auto; padding: 30px 20px 60px; }

/* ===== الفلاتر ===== */
.dash-toolbar {
  display: flex; gap: 15px; flex-wrap: wrap; margin-bottom: 30px; align-items: flex-end;
}
.filter-group { display: flex; flex-direction: column; gap: 5px; }
.filter-group label { font-size: 0.85rem; color: #aaa; font-weight: bold; }
.filter-group input, .filter-group select {
  padding: 10px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2);
  background: rgba(255,255,255,0.1); color: #fff; font-family: inherit;
}
.filter-group input:focus, .filter-group select:focus { outline: none; border-color: #4da6ff; }
.dash-toolbar button {
  padding: 10px 20px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2);
  background: rgba(255,255,255,0.1); color: #fff; cursor: pointer; transition: 0.3s;
}
.dash-toolbar button:hover { background: rgba(255,255,255,0.2); }

/* ===== الإحصائيات ===== */
.dash-stats {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-bottom: 30px;
}
.stat-card {
  background: rgba(255,255,255,0.05); padding: 20px; border-radius: 15px; text-align: center; border: 1px solid rgba(255,255,255,0.05);
}
.stat-card strong { display: block; font-size: 2rem; color: #4da6ff; }
.stat-card span { font-size: 0.9rem; color: #aaa; }

/* ===== الجدول ===== */
.table-wrap {
  background: rgba(255,255,255,0.05); border-radius: 20px; overflow: hidden;
  border: 1px solid rgba(255,255,255,0.05); overflow-x: auto;
}
.appt-table { width: 100%; border-collapse: collapse; min-width: 700px; }
.appt-table th, .appt-table td { padding: 15px; text-align: right; border-bottom: 1px solid rgba(255,255,255,0.05); }
.appt-table th { background: rgba(255,255,255,0.1); color: #4da6ff; font-weight: bold; }
.appt-table td { color: #ddd; }
.appt-table tr:hover { background: rgba(255,255,255,0.05); }
.empty-row { text-align: center; padding: 30px; color: #888; }

/* ===== البادجات ===== */
.badge { display: inline-block; padding: 4px 12px; border-radius: 999px; font-size: 0.8rem; font-weight: bold; }
.badge-confirmed { background: rgba(77, 166, 255, 0.2); color: #4da6ff; }
.badge-done { background: rgba(46, 213, 115, 0.2); color: #2ed573; }
.badge-cancelled { background: rgba(255, 107, 107, 0.2); color: #ff6b6b; }

/* ===== الأزرار داخل الجدول ===== */
.row-actions { display: flex; gap: 5px; flex-wrap: wrap; }
.row-actions button {
  padding: 4px 12px; border-radius: 6px; border: none; cursor: pointer; font-size: 0.8rem;
  background: rgba(255,255,255,0.1); color: #fff;
}
.row-actions button:hover { background: rgba(255,255,255,0.2); }
.row-actions button.danger { background: rgba(255, 107, 107, 0.2); color: #ff6b6b; }
.row-actions button.danger:hover { background: rgba(255, 107, 107, 0.4); }

@media (max-width: 768px) {
  .dash-header-inner { flex-direction: column; align-items: stretch; }
  .dash-toolbar { flex-direction: column; }
  .filter-group { width: 100%; }
  .filter-group input, .filter-group select { width: 100%; }
  #notifications-list { width: calc(100vw - 40px); right: -20px; }
}
</style>
</head>
<body>

<!-- ============ شاشة تسجيل الدخول ============ -->
<div id="login-screen" class="login-screen">
  <form id="login-form" class="login-card">
    <div class="login-brand">
      <h1>لوحة تحكم الطبيب</h1>
    </div>
    <div class="form-row">
      <label for="username">اسم المستخدم</label>
      <input type="text" id="username" required autocomplete="username">
    </div>
    <div class="form-row">
      <label for="password">كلمة المرور</label>
      <input type="password" id="password" required autocomplete="current-password">
    </div>
    <button type="submit" class="btn-block">تسجيل الدخول</button>
    <p id="login-message" class="form-message"></p>
  </form>
</div>

<!-- ============ لوحة التحكم ============ -->
<div id="dashboard-screen" class="hidden">
  <header class="dash-header">
    <div class="dash-header-inner">
      <span class="brand">عيادة <strong>ابتسامة</strong> — لوحة الطبيب</span>
      <div style="display:flex; gap:10px; align-items:center; flex-wrap:wrap;">
        <button id="patients-btn">المرضى</button>
       <button id="new-appointment-btn">
         ➕ حجز جديد
          </button>
        
        <div id="notification-box">
          <button id="notification-btn">🔔 الإشعارات <span id="notification-count"></span></button>
          <div id="notifications-list"></div>
        </div>

        <button id="logout-btn">تسجيل الخروج</button>
      </div>
    </div>
  </header>

  <main class="dash-main">
    <div class="dash-toolbar">
      <div class="filter-group">
        <label for="filter-search">بحث</label>
        <input type="text" id="filter-search" placeholder="اسم المريض أو الهاتف">
      </div>
      <div class="filter-group">
        <label for="filter-date">التاريخ</label>
        <input type="date" id="filter-date">
      </div>
      <div class="filter-group">
        <label for="filter-status">الحالة</label>
        <select id="filter-status">
          <option value="">الكل</option>
          <option value="confirmed">مؤكد</option>
          <option value="done">تم الكشف</option>
          <option value="cancelled">ملغى</option>
        </select>
      </div>
      <button id="refresh-btn">تحديث</button>
      <button id="clear-filters-btn">مسح الفلاتر</button>
    </div>

    <div class="dash-stats" id="dash-stats"></div>

    <div class="table-wrap">
      <table class="appt-table">
        <thead>
          <tr>
            <th>المريض</th>
            <th>الهاتف</th>
            <th>التاريخ</th>
            <th>الوقت</th>
            <th>الخدمة</th>
            <th>الحالة</th>
            <th>تذكير</th>
            <th>الإجراءات</th>
          </tr>
        </thead>
        <tbody id="appt-tbody">
          <tr><td colspan="8" class="empty-row">جارِ التحميل...</td></tr>
        </tbody>
      </table>
    </div>
  </main>
</div>
 <!-- نافذة حجز جديد -->

<div id="appointment-modal" class="modal hidden">

<div class="modal-box">

<h2>
➕ إضافة حجز جديد
</h2>


<label>اسم المريض</label>
<input id="new-name" type="text">


<label>رقم الهاتف</label>
<input id="new-phone" type="text">


<label>التاريخ</label>
<input id="new-date" type="date">


<label>الوقت</label>

<select id="new-time">
    <option value="">اختر التاريخ أولاً</option>
</select>


<label>الخدمة</label>

<select id="new-service">

<option value="كشف عام">كشف عام</option>
<option value="تنظيف وتلميع">تنظيف وتلميع</option>
<option value="تبييض الأسنان">تبييض الأسنان</option>
<option value="تقويم الأسنان">تقويم الأسنان</option>
<option value="حشوات">حشوات</option>
<option value="زراعة أسنان">زراعة أسنان</option>
<option value="طوارئ">طوارئ / ألم حاد</option>

</select>


<div class="modal-buttons">

<button id="save-appointment">
حفظ الحجز
</button>


<button id="close-modal">
إلغاء
</button>

</div>


</div>

</div>
<script src="js/dashboard.js"></script>
</body>
</html>
